<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="logo">Sales Tools <span class="logo-badge">AWS</span></h1>
            </div>
            <div class="topbar-right">
                <span class="model-badge">Claude Sonnet 4.6</span>
                <span class="avatar">SA</span>
            </div>
        </header>

        <main class="main">
            <div class="tabs-bar">
                <button class="tab active" data-tab="pricing-table">Pricing Table Generator</button>
            </div>

            <div class="tab-content active" id="tab-pricing-table">
                <div class="tool-panel">

                    <!-- Left: Upload + Controls -->
                    <div class="input-panel">
                        <div class="section-label">1. Upload JSON Export</div>
                        <div class="upload-area" id="upload-area">
                            <input type="file" id="file-input" accept=".json" hidden>
                            <div class="upload-prompt" id="upload-prompt">
                                <div class="upload-icon">↑</div>
                                <div class="upload-text">Drop JSON file here</div>
                                <div class="upload-sub">or <span class="upload-link" id="upload-browse">browse</span></div>
                            </div>
                            <div class="upload-ready" id="upload-ready" style="display:none">
                                <div class="file-icon">✓</div>
                                <div class="file-name" id="file-name"></div>
                                <button class="btn-clear" id="btn-clear">✕</button>
                            </div>
                        </div>

                        <div class="section-label" style="margin-top:16px">2. MYR Exchange Rate</div>
                        <div class="rate-row">
                            <span class="rate-label">USD 1 =</span>
                            <input type="number" id="myr-rate" value="4.4" step="0.01" min="1" max="10">
                            <span class="rate-label">MYR</span>
                            <a href="https://www.xe.com/currencyconverter/convert/?Amount=1&From=USD&To=MYR" target="_blank" class="rate-link">check live rate</a>
                        </div>

                        <button class="btn-generate" id="btn-generate" disabled>
                            Generate Table
                        </button>

                        <div class="status-area" id="status-area"></div>

                        <div style="margin-top: auto; padding-top: 16px;">
                            <button class="btn-open-table" id="btn-open-table" disabled>
                                Open Table in New Tab
                            </button>
                            <div class="open-hint" id="open-hint" style="display:none">
                                Cmd+A → Cmd+C → paste into Google Doc
                            </div>
                        </div>
                    </div>

                    <!-- Right: Estimate Preview -->
                    <div class="preview-panel" id="preview-panel">
                        <div class="preview-placeholder" id="preview-placeholder">
                            <p>Upload a JSON export to see the estimate summary.</p>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
