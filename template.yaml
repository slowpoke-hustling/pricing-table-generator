AWSTemplateFormatVersion: '2010-09-09'
Description: Pricing Table Generator — Lambda + API Gateway + S3 + CloudFront

Parameters:
  FrontendBucket:
    Type: String
  LambdaBucket:
    Type: String
  JsonStorageBucket:
    Type: String

Resources:

  # ── JSON Storage Bucket ──────────────────────────────────────────────────
  JsonStorage:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref JsonStorageBucket
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: project
          Value: pricing-table-generator

  # ── Lambda IAM Role ──────────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAndS3
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${JsonStorageBucket}'
                  - !Sub 'arn:aws:s3:::${JsonStorageBucket}/*'

  # ── Lambda Function ──────────────────────────────────────────────────────
  GenerateFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: pricing-table-generator
      Runtime: python3.12
      Handler: lambda_function.handler
      Role: !GetAtt LambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaBucket
        S3Key: pricing_table_generator.zip
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          S3_BUCKET: !Ref JsonStorageBucket

  GeneratePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GenerateFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*'

  # ── API Gateway ──────────────────────────────────────────────────────────
  Api:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: pricing-table-generator-api

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref Api
      ParentId: !GetAtt Api.RootResourceId
      PathPart: api

  GenerateResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref Api
      ParentId: !Ref ApiResource
      PathPart: generate

  GeneratePost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref GenerateResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GenerateFunction.Arn}/invocations'

  GenerateOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref GenerateResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: [GeneratePost, GenerateOptions]
    Properties:
      RestApiId: !Ref Api
      StageName: prod

  # ── CloudFront + Frontend S3 ─────────────────────────────────────────────
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${FrontendBucket}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFront}'

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: pricing-table-generator-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFront:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !Sub '${FrontendBucket}.s3.amazonaws.com'
            OriginAccessControlId: !Ref OAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  ApiUrl:
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod'
  CloudFrontUrl:
    Value: !Sub 'https://${CloudFront.DomainName}'
  JsonBucket:
    Value: !Ref JsonStorageBucket
